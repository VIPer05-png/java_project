spring.application.name=wanderlust

# MySQL Configuration for XAMPP
spring.datasource.url=jdbc:mysql://localhost:3306/wanderlust_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate Configuration
# update ensures tables are created automatically
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true

# Thymeleaf caching for development
spring.thymeleaf.cache=false
