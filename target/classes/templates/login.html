<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Wanderlust – Login</title></head>
<body>
<main layout:fragment="content">
    <div class="auth-page">
        <div class="auth-card animate-fade-up">

            <div class="auth-header">
                <div class="auth-icon"><i class="fa-solid fa-plane-departure"></i></div>
                <h2>Welcome Back</h2>
                <p>Login to continue planning your trips</p>
            </div>

            <div class="auth-body">
                <div th:if="${param.error}" class="wl-alert wl-alert-danger">
                    <i class="fa-solid fa-circle-exclamation"></i> Invalid username or password.
                </div>
                <div th:if="${param.logout}" class="wl-alert wl-alert-success">
                    <i class="fa-solid fa-check-circle"></i> You have been logged out.
                </div>
                <div th:if="${param.registered}" class="wl-alert wl-alert-success">
                    <i class="fa-solid fa-check-circle"></i> Registration successful! Please log in.
                </div>

                <form th:action="@{/login}" method="post">
                    <div class="form-group">
                        <label class="form-label" for="login-username">Username</label>
                        <input id="login-username" type="text" name="username"
                               class="form-input" required autofocus placeholder="Enter your username">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="login-password">Password</label>
                        <input id="login-password" type="password" name="password"
                               class="form-input" required placeholder="Enter your password">
                    </div>
                    <button type="submit" class="btn-auth">
                        <i class="fa-solid fa-arrow-right-to-bracket"></i> Login
                    </button>
                </form>
            </div>

            <div class="auth-footer">
                Don't have an account?
                <a th:href="@{/register}">Register here</a>
            </div>
        </div>
    </div>
</main>
</body>
</html>
