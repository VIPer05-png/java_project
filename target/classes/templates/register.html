<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Wanderlust – Create Account</title></head>
<body>
<main layout:fragment="content">
    <div class="auth-page">
        <div class="auth-card animate-fade-up">

            <div class="auth-header">
                <div class="auth-icon"><i class="fa-solid fa-passport"></i></div>
                <h2>Create Account</h2>
                <p>Start your journey with Wanderlust today</p>
            </div>

            <div class="auth-body">
                <div th:if="${error}" class="wl-alert wl-alert-danger">
                    <i class="fa-solid fa-circle-exclamation"></i>
                    <span th:text="${error}"></span>
                </div>

                <form th:action="@{/register}" th:object="${user}" method="post">
                    <div class="form-group">
                        <label class="form-label" for="reg-username">Username</label>
                        <input id="reg-username" type="text" th:field="*{username}"
                               class="form-input" required placeholder="Choose a username">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="reg-email">Email Address</label>
                        <input id="reg-email" type="email" th:field="*{email}"
                               class="form-input" required placeholder="your@email.com">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="reg-password">Password</label>
                        <input id="reg-password" type="password" th:field="*{password}"
                               class="form-input" required placeholder="Create a password">
                    </div>
                    <button type="submit" class="btn-auth">
                        <i class="fa-solid fa-user-plus"></i> Create Account
                    </button>
                </form>
            </div>

            <div class="auth-footer">
                Already have an account?
                <a th:href="@{/login}">Login here</a>
            </div>
        </div>
    </div>
</main>
</body>
</html>
