<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Wanderlust — Premium travel experiences curated for you. Book tour packages, explore destinations, and plan your perfect trip.">
    <title>Wanderlust – Travel Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <!-- ░░ NAVBAR ░░ -->
    <nav class="wl-navbar">
        <div class="container">
            <a class="wl-brand" th:href="@{/}">
                <div class="brand-icon"><i class="fa-solid fa-plane-departure"></i></div>
                Wanderlust
            </a>

            <ul class="wl-nav-links">
                <li><a class="wl-nav-link" th:href="@{/}"><i class="fa-solid fa-house" style="font-size:.75rem"></i> Home</a></li>

                <!-- Unauthenticated -->
                <li sec:authorize="!isAuthenticated()">
                    <a class="btn-wl-outline" th:href="@{/login}">Login</a>
                </li>
                <li sec:authorize="!isAuthenticated()">
                    <a class="btn-wl-primary" th:href="@{/register}"><i class="fa-solid fa-user-plus"></i> Register</a>
                </li>

                <!-- Authenticated USER -->
                <li sec:authorize="hasRole('ROLE_USER')">
                    <a class="wl-nav-link" th:href="@{/user/dashboard}"><i class="fa-solid fa-suitcase-rolling" style="font-size:.75rem"></i> My Bookings</a>
                </li>

                <!-- Authenticated ADMIN -->
                <li sec:authorize="hasRole('ROLE_ADMIN')">
                    <a class="wl-nav-link" th:href="@{/admin/dashboard}" style="color:#fbbf24 !important"><i class="fa-solid fa-shield-halved" style="font-size:.75rem"></i> Admin</a>
                </li>

                <!-- Logout -->
                <li sec:authorize="isAuthenticated()">
                    <form th:action="@{/logout}" method="post">
                        <button type="submit" class="btn-wl-danger">
                            <i class="fa-solid fa-right-from-bracket"></i> Logout
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </nav>

    <!-- ░░ CONTENT ░░ -->
    <main layout:fragment="content">
        <!-- views inject here -->
    </main>

    <!-- ░░ FOOTER ░░ -->
    <footer class="wl-footer">
        <p>&copy; 2026 <strong>Wanderlust</strong> Travel Management System &mdash; MCA Final Year Project</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
